<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muskan Cafe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Muskan Cafe</h1>
    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section id="home" class="hero">
    <h2>Welcome to Muskan Cafe</h2>
    <p>Best Coffee & Snacks in Town</p>
</section>

<section id="about">
    <h2>About Us</h2>
    <p>We serve fresh coffee, tea and delicious snacks with excellent customer service.</p>
</section>

<section id="services">
    <h2>Our Services</h2>
    <ul>
        <li>Coffee</li>
        <li>Tea</li>
        <li>Fast Food</li>
        <li>Home Delivery</li>
    </ul>
</section>

<section id="contact">
    <h2>Contact Us</h2>

    <input type="text" id="name" placeholder="Your Name">
    <input type="email" id="email" placeholder="Your Email">
    <textarea id="message" placeholder="Your Message"></textarea>

    <button onclick="sendMessage()">Send Message</button>
</section>

<script src="script.js"></script>

</body>
</html>
